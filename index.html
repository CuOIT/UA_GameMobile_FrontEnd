<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UA Marketing Bootcamp for Unity Devs</title>
    <link rel="stylesheet" href="./styles.css?v=1.5.7" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  </head>
  <body>
    <div class="reading-progress" id="readingProgress" aria-hidden="true">
      <span></span>
    </div>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary navigation">
        <a class="brand" href="#dashboard" aria-label="Dashboard">
          <span class="brand-mark">UA</span>
          <span>
            <strong>Mobile Game UA</strong>
            <small>30-day bootcamp</small>
          </span>
        </a>
        <nav class="nav-list">
          <a href="#dashboard" data-nav="dashboard"><i data-lucide="layout-dashboard"></i>Dashboard</a>
          <details class="nav-course-dropdown" id="courseNavDropdown">
            <summary data-nav="lessons"><i data-lucide="book-open-check"></i>30-Day Lessons</summary>
            <div class="nav-course-options" id="courseNavOptions"></div>
          </details>
          <a href="#glossary" data-nav="glossary"><i data-lucide="languages"></i>Glossary</a>
          <a href="#tools" data-nav="tools"><i data-lucide="calculator"></i>Tools</a>
          <a href="#cases" data-nav="cases"><i data-lucide="file-search"></i>Case Studies</a>
          <a href="#chat" data-nav="chat"><i data-lucide="messages-square"></i>AI Chat</a>
          <a href="#plan" data-nav="plan"><i data-lucide="clipboard-list"></i>Final UA Plan</a>
          <a href="#account" data-nav="account"><i data-lucide="circle-user-round"></i>Account</a>
        </nav>
        <section class="stage-filter" aria-label="Learner stage">
          <label for="stageSelect">Learner stage</label>
          <select id="stageSelect">
            <option value="all">All stages</option>
            <option value="idea">No game yet</option>
            <option value="prototype">Prototype / pre-launch</option>
            <option value="live">Newly live game</option>
          </select>
        </section>
        <footer class="sidebar-footer">
          <p class="version-note" id="appVersionNote">Version 1.0.0</p>
        </footer>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Bilingual Vietnamese-first learning site</p>
            <h1 id="pageTitle">Dashboard</h1>
          </div>
          <div class="topbar-actions" id="authActions">
            <a class="button" id="topbarSignInBtn" href="#signin"><i data-lucide="log-in"></i>Sign in</a>
            <a class="button ghost-button" id="topbarSignUpBtn" href="#signup"><i data-lucide="user-plus"></i>Sign up</a>
            <button class="ghost-button danger hidden" id="topbarLogoutBtn" type="button"><i data-lucide="log-out"></i>Log out</button>
          </div>
        </header>
        <div id="app" class="view" aria-live="polite"></div>
      </main>
    </div>

    <template id="loadingTemplate">
      <section class="panel">
        <p>Loading static content...</p>
      </section>
    </template>

    <script src="./app.js?v=1.5.7" type="module"></script>
  </body>
</html>
