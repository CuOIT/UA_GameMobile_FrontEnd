<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Day 1 UA learning loop visual</title>
  <desc id="desc">Illustrative UA loop and sample campaign funnel for source-backed game cases.</desc>
  <rect width="1200" height="620" fill="#f7faf8"/>
  <rect x="36" y="34" width="1128" height="552" rx="22" fill="#ffffff" stroke="#d9e5df"/>
  <text x="68" y="82" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#10251f">Day 1: Source-backed UA loop</text>
  <text x="68" y="114" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5b6b64">Illustrative visual only - not official campaign data or official game screenshot.</text>

  <g transform="translate(68 152)">
    <rect width="330" height="248" rx="18" fill="#eef6ff" stroke="#bfd7ee"/>
    <text x="24" y="38" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#17324d">Global pattern</text>
    <text x="24" y="68" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#244866">Royal Match</text>
    <rect x="28" y="92" width="104" height="104" rx="16" fill="#5e8dd3"/>
    <rect x="52" y="116" width="56" height="56" rx="10" fill="#f7cf60"/>
    <circle cx="80" cy="144" r="20" fill="#ffffff" opacity="0.9"/>
    <path d="M190 96 h76 a18 18 0 0 1 18 18 v64 a18 18 0 0 1-18 18 h-76 a18 18 0 0 1-18-18 v-64 a18 18 0 0 1 18-18z" fill="#ffffff" stroke="#8fb3d8"/>
    <text x="190" y="127" font-family="Inter, Arial, sans-serif" font-size="13" fill="#244866">Promise</text>
    <text x="190" y="151" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#17324d">Puzzle +</text>
    <text x="190" y="174" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#17324d">progression</text>
    <text x="24" y="224" font-family="Inter, Arial, sans-serif" font-size="14" fill="#38546b">Use source facts to infer promise clarity,</text>
    <text x="24" y="244" font-family="Inter, Arial, sans-serif" font-size="14" fill="#38546b">not CPI, D1, ROAS or creative winners.</text>
  </g>

  <g transform="translate(435 152)">
    <rect width="330" height="248" rx="18" fill="#fff4e8" stroke="#edcfad"/>
    <text x="24" y="38" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#4a2c14">Vietnam pattern</text>
    <text x="24" y="68" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#6b4420">Zego Studio catalog</text>
    <g transform="translate(28 94)">
      <rect width="82" height="44" rx="12" fill="#ffffff" stroke="#dcae7f"/><text x="18" y="28" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#6b4420">Sort</text>
      <rect x="96" width="82" height="44" rx="12" fill="#ffffff" stroke="#dcae7f"/><text x="112" y="28" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#6b4420">Rescue</text>
      <rect x="192" width="82" height="44" rx="12" fill="#ffffff" stroke="#dcae7f"/><text x="211" y="28" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#6b4420">Tile</text>
      <rect y="62" width="82" height="44" rx="12" fill="#ffffff" stroke="#dcae7f"/><text x="19" y="90" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#6b4420">Screw</text>
      <rect x="96" y="62" width="82" height="44" rx="12" fill="#ffffff" stroke="#dcae7f"/><text x="114" y="90" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#6b4420">Yarn</text>
      <rect x="192" y="62" width="82" height="44" rx="12" fill="#ffffff" stroke="#dcae7f"/><text x="208" y="90" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#6b4420">Hoop</text>
    </g>
    <text x="24" y="224" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6b4420">Catalog fact supports promise-loop thinking:</text>
    <text x="24" y="244" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6b4420">ad hook -> store proof -> first session proof.</text>
  </g>

  <g transform="translate(820 152)">
    <rect width="300" height="248" rx="18" fill="#effaf3" stroke="#b9dec8"/>
    <text x="24" y="38" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#173824">Sample funnel</text>
    <g font-family="Inter, Arial, sans-serif" font-size="13" fill="#274936">
      <text x="24" y="76">Impressions</text><rect x="118" y="62" width="148" height="16" rx="8" fill="#245b3c"/><text x="272" y="76">1000</text>
      <text x="24" y="112">Clicks</text><rect x="118" y="98" width="86" height="16" rx="8" fill="#3f7d55"/><text x="214" y="112">28</text>
      <text x="24" y="148">Installs</text><rect x="118" y="134" width="44" height="16" rx="8" fill="#73a470"/><text x="172" y="148">7</text>
      <text x="24" y="184">Level 3</text><rect x="118" y="170" width="28" height="16" rx="8" fill="#c1a84f"/><text x="156" y="184">3</text>
      <text x="24" y="220">D1 return</text><rect x="118" y="206" width="20" height="16" rx="8" fill="#c66745"/><text x="148" y="220">2</text>
    </g>
  </g>

  <text x="68" y="470" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#10251f">Read order</text>
  <text x="68" y="502" font-family="Inter, Arial, sans-serif" font-size="16" fill="#35443e">1. Is the promise visible?  2. Does store proof match?  3. Does first session prove the promise?  4. Which signal decides the next action?</text>
  <text x="68" y="538" font-family="Inter, Arial, sans-serif" font-size="14" fill="#697970">Source facts: Royal Match public article + Zego Studio Google Play page. Campaign numbers are illustrative.</text>
</svg>
