<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
        <rect width="100%" height="100%" fill="#0f172a" rx="16"/>
        <text x="400" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Funnel Leak Diagnosis Diagram</text>
        <text x="400" y="95" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">How to locate and fix leakage in the promise chain</text>
        <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8" />
            </marker>
        </defs>
        
    <rect x="50" y="180" width="200" height="80" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <text x="150" y="215" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">Low Store CTR?</text>
    <text x="150" y="240" font-family="Arial" font-size="12" fill="#94a3b8" text-anchor="middle">Fix ad promise alignment</text>

    <path d="M 250 220 L 290 220" stroke="#38bdf8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

    <rect x="300" y="180" width="200" height="80" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
    <text x="400" y="215" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">Low Store CVR?</text>
    <text x="400" y="240" font-family="Arial" font-size="12" fill="#e9d5ff" text-anchor="middle">Fix store proof alignment</text>

    <path d="M 500 220 L 540 220" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

    <rect x="550" y="180" width="200" height="80" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
    <text x="650" y="215" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">Low D1 Retention?</text>
    <text x="650" y="240" font-family="Arial" font-size="12" fill="#a7f3d0" text-anchor="middle">Fix first session onboarding</text>
    
    </svg>