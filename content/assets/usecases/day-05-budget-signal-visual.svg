<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
        <rect width="100%" height="100%" fill="#0f172a" rx="16"/>
        <text x="400" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Budget Signal Threshold Matrix</text>
        <text x="400" y="95" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Deciding whether to scale or pause ad spend based on early metrics</text>
        <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8" />
            </marker>
        </defs>
        
    <rect x="100" y="180" width="280" height="200" rx="8" fill="#1e293b" stroke="#f43f5e" stroke-width="2"/>
    <text x="240" y="220" font-family="Arial" font-size="20" font-weight="bold" fill="#f43f5e" text-anchor="middle">PAUSE / REFACTOR</text>
    <text x="240" y="270" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">CTR &lt; 1.5%</text>
    <text x="240" y="310" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Store CVR &lt; 10%</text>
    <text x="240" y="350" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">High CPI, Low Cohort Size</text>

    <rect x="420" y="180" width="280" height="200" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="560" y="220" font-family="Arial" font-size="20" font-weight="bold" fill="#10b981" text-anchor="middle">SCALE BUDGET</text>
    <text x="560" y="270" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">CTR &gt; 3.0%</text>
    <text x="560" y="310" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Store CVR &gt; 25%</text>
    <text x="560" y="350" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Good D1 Retention (40%+)</text>
    
    </svg>