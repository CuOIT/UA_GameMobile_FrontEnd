<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
        <rect width="100%" height="100%" fill="#1e1b4b" rx="16"/>
        <text x="400" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Hook Motivation Map</text>
        <text x="400" y="95" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Mapping player motivation to creative hook mechanics</text>
        <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#34d399" />
            </marker>
        </defs>
        
    <rect x="80" y="170" width="180" height="220" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <text x="170" y="205" font-family="Arial" font-size="18" font-weight="bold" fill="#38bdf8" text-anchor="middle">Relaxation Hook</text>
    <text x="170" y="250" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Fluid motions</text>
    <text x="170" y="290" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Harmonious colors</text>
    <text x="170" y="330" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Sorting sounds</text>

    <rect x="310" y="170" width="180" height="220" rx="8" fill="#1e293b" stroke="#f43f5e" stroke-width="2"/>
    <text x="400" y="205" font-family="Arial" font-size="18" font-weight="bold" fill="#f43f5e" text-anchor="middle">Challenge Hook</text>
    <text x="400" y="250" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Impending fail</text>
    <text x="400" y="290" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Locked pieces</text>
    <text x="400" y="330" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Ticking timer</text>

    <rect x="540" y="170" width="180" height="220" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
    <text x="630" y="205" font-family="Arial" font-size="18" font-weight="bold" fill="#34d399" text-anchor="middle">Discovery Hook</text>
    <text x="630" y="250" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Hidden objects</text>
    <text x="630" y="290" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Unlocking zones</text>
    <text x="630" y="330" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Map progression</text>
    
    </svg>