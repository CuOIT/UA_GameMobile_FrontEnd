<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
        <rect width="100%" height="100%" fill="#0f172a" rx="16"/>
        <text x="400" y="80" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">Weekly UA Loop</text>
        <text x="400" y="120" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">Operating rhythm for User Acquisition</text>
    
        <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8" />
            </marker>
        </defs>
        <rect x="300" y="180" width="200" height="60" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
        <text x="400" y="215" font-family="Arial, sans-serif" font-size="16" fill="#e2e8f0" text-anchor="middle">Input / Trigger</text>
        
        <path d="M 400 240 L 400 280" stroke="#38bdf8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
        
        <rect x="150" y="280" width="200" height="60" rx="8" fill="#1e293b" stroke="#f43f5e" stroke-width="2"/>
        <text x="250" y="315" font-family="Arial, sans-serif" font-size="16" fill="#e2e8f0" text-anchor="middle">Evaluate Scenario A</text>

        <rect x="450" y="280" width="200" height="60" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
        <text x="550" y="315" font-family="Arial, sans-serif" font-size="16" fill="#e2e8f0" text-anchor="middle">Evaluate Scenario B</text>

        <path d="M 400 260 L 250 260 L 250 280" stroke="#38bdf8" stroke-width="3" fill="none" />
        <path d="M 400 260 L 550 260 L 550 280" stroke="#38bdf8" stroke-width="3" fill="none" />
        </svg>