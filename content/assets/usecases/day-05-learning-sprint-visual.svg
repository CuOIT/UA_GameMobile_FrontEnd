<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
        <rect width="100%" height="100%" fill="#1e1b4b" rx="16"/>
        <text x="400" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Day 5 Learning Sprint Timeline</text>
        <text x="400" y="95" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Structure of the UA optimization sprint</text>
        <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#34d399" />
            </marker>
        </defs>
        
    <rect x="100" y="180" width="160" height="120" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <text x="180" y="220" font-family="Arial" font-size="18" font-weight="bold" fill="#38bdf8" text-anchor="middle">Days 1 - 2</text>
    <text x="180" y="260" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Creative Testing</text>

    <path d="M 260 240 L 310 240" stroke="#38bdf8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

    <rect x="320" y="180" width="160" height="120" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
    <text x="400" y="220" font-family="Arial" font-size="18" font-weight="bold" fill="#a855f7" text-anchor="middle">Days 3 - 4</text>
    <text x="400" y="260" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Store Page A/B</text>

    <path d="M 480 240 L 530 240" stroke="#a855f7" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

    <rect x="540" y="180" width="160" height="120" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
    <text x="620" y="220" font-family="Arial" font-size="18" font-weight="bold" fill="#34d399" text-anchor="middle">Day 5</text>
    <text x="620" y="260" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Data Consolidation</text>
    
    </svg>