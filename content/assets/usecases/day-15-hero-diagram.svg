<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
        <rect width="100%" height="100%" fill="#0f172a" rx="16"/>
        <text x="400" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Hook Signal Board</text>
        <text x="400" y="95" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Storyboard demonstrating a consistent puzzle interaction sequence</text>
        <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8" />
            </marker>
        </defs>
        
    <rect x="60" y="180" width="190" height="200" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <text x="155" y="215" font-family="Arial" font-size="16" font-weight="bold" fill="#38bdf8" text-anchor="middle">Frame 1: Initial Hook</text>
    <text x="155" y="260" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Player sees disordered</text>
    <text x="155" y="290" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">color tubes to sort</text>
    <text x="155" y="330" font-family="Arial" font-size="12" fill="#94a3b8" text-anchor="middle">Visual: Clear Layout</text>

    <path d="M 250 280 L 290 280" stroke="#38bdf8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

    <rect x="300" y="180" width="190" height="200" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
    <text x="395" y="215" font-family="Arial" font-size="16" font-weight="bold" fill="#a855f7" text-anchor="middle">Frame 2: Interaction</text>
    <text x="395" y="260" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Tap to pour color</text>
    <text x="395" y="290" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">from Tube A to Tube B</text>
    <text x="395" y="330" font-family="Arial" font-size="12" fill="#c084fc" text-anchor="middle">Visual: Hand Icon tap</text>

    <path d="M 490 280 L 530 280" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

    <rect x="540" y="180" width="190" height="200" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
    <text x="635" y="215" font-family="Arial" font-size="16" font-weight="bold" fill="#34d399" text-anchor="middle">Frame 3: Resolution</text>
    <text x="635" y="260" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Color is sorted</text>
    <text x="635" y="290" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Satisfying ASMR ring</text>
    <text x="635" y="330" font-family="Arial" font-size="12" fill="#86efac" text-anchor="middle">Visual: Level Complete</text>
    
    </svg>