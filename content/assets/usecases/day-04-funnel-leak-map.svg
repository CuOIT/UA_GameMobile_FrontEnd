<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
        <rect width="100%" height="100%" fill="#1e1b4b" rx="16"/>
        <text x="400" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Funnel Leak Map</text>
        <text x="400" y="95" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Analyzing drop-offs across the User Acquisition funnel</text>
        <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#34d399" />
            </marker>
        </defs>
        
    <!-- Funnel Stage 1 -->
    <rect x="150" y="160" width="500" height="50" rx="4" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <text x="400" y="190" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">Impression -> Store Page (CTR: 3.5%)</text>
    <path d="M 650 185 L 700 185 L 700 220" stroke="#f43f5e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <text x="710" y="235" font-family="Arial" font-size="12" fill="#f43f5e">96.5% Drop-off (Bounce)</text>

    <!-- Funnel Stage 2 -->
    <rect x="200" y="240" width="400" height="50" rx="4" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
    <text x="400" y="270" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">Store Page -> Install (CVR: 25%)</text>
    <path d="M 600 265 L 650 265 L 650 300" stroke="#f43f5e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <text x="660" y="315" font-family="Arial" font-size="12" fill="#f43f5e">75% Drop-off (Store Exit)</text>

    <!-- Funnel Stage 3 -->
    <rect x="250" y="320" width="300" height="50" rx="4" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
    <text x="400" y="350" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">Install -> First Session (D0 Open: 90%)</text>
    <path d="M 550 345 L 590 345 L 590 380" stroke="#f43f5e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <text x="600" y="395" font-family="Arial" font-size="12" fill="#f43f5e">10% Drop-off (Unopened)</text>

    <!-- Active Users -->
    <rect x="300" y="400" width="200" height="50" rx="4" fill="#1e1b4b" stroke="#10b981" stroke-width="2"/>
    <text x="400" y="430" font-family="Arial" font-size="16" font-weight="bold" fill="#10b981" text-anchor="middle">Active Player Cohort</text>
    
    </svg>