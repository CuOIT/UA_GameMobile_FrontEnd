<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
        <rect width="100%" height="100%" fill="#1e1b4b" rx="16"/>
        <text x="400" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Motivation Map - Puzzle Game</text>
        <text x="400" y="95" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">How player motivations map to core puzzle gameplay loops</text>
        <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#34d399" />
            </marker>
        </defs>
        
    <rect x="80" y="160" width="180" height="240" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <text x="170" y="195" font-family="Arial" font-size="18" font-weight="bold" fill="#38bdf8" text-anchor="middle">1. Relaxation</text>
    <text x="170" y="240" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">ASMR Sounds</text>
    <text x="170" y="280" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Satisfying Colors</text>
    <text x="170" y="320" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">No Timer Stress</text>

    <rect x="310" y="160" width="180" height="240" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
    <text x="400" y="195" font-family="Arial" font-size="18" font-weight="bold" fill="#a855f7" text-anchor="middle">2. Challenge</text>
    <text x="400" y="240" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Complex Paths</text>
