    <text x="400" y="320" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Clever Solutions</text>

    <rect x="540" y="160" width="180" height="240" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
    <text x="630" y="195" font-family="Arial" font-size="18" font-weight="bold" fill="#34d399" text-anchor="middle">3. Completion</text>
    <text x="630" y="240" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Star Collection</text>
    <text x="630" y="280" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Level Progression</text>
    <text x="630" y="320" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="middle">Album Collection</text>
    
